<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dad Joke Generator</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #f59e0b;
      --accent-hover: #fbbf24;
      --text: #f1f5f9;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .wrap {
      width: 100%;
      max-width: 560px;
      text-align: center;
    }
    h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      margin: 0 0 32px;
      letter-spacing: -0.02em;
    }
    button {
      font-size: 1.4rem;
      font-weight: 700;
      padding: 20px 40px;
      border: none;
      border-radius: 999px;
      background: var(--accent);
      color: #1a1204;
      cursor: pointer;
      transition: transform 0.1s ease, background 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 10px 30px rgba(245, 158, 11, 0.35);
    }
    button:hover { background: var(--accent-hover); }
    button:active { transform: scale(0.96); }
    .joke-box {
      margin-top: 36px;
      min-height: 120px;
      background: var(--card);
      border-radius: 16px;
      padding: 28px 24px;
      font-size: 1.3rem;
      line-height: 1.5;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
    }
    .fade-in { animation: fadeIn 0.6s ease forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .hint { margin-top: 16px; opacity: 0.5; font-size: 0.85rem; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>😄 Dad Joke Generator</h1>
    <button id="jokeBtn">Tell me a joke</button>
    <div id="jokeBox" class="joke-box">Click the button for your first groan…</div>
    <p class="hint">Warning: side effects may include eye-rolling.</p>
  </main>

  <script>
    const FALLBACK_JOKES = [
      "I'm reading a book about anti-gravity. It's impossible to put down.",
      "Did you hear about the restaurant on the moon? Great food, no atmosphere.",
      "Why don't scientists trust atoms? Because they make up everything.",
      "I only know 25 letters of the alphabet. I don't know y.",
      "What do you call a fake noodle? An impasta.",
      "Why did the scarecrow win an award? He was outstanding in his field.",
      "I used to hate facial hair, but then it grew on me.",
      "What do you call cheese that isn't yours? Nacho cheese.",
      "I would tell you a construction joke, but I'm still working on it.",
      "Why don't eggs tell jokes? They'd crack each other up.",
      "How do you organize a space party? You planet.",
      "I'm on a seafood diet. Every time I see food, I eat it.",
      "Why did the bicycle fall over? Because it was two-tired.",
      "What did the ocean say to the beach? Nothing, it just waved.",
      "Why can't you give Elsa a balloon? Because she'll let it go.",
      "I don't trust stairs. They're always up to something.",
      "What do you call a bear with no teeth? A gummy bear.",
      "Why did the coffee file a police report? It got mugged.",
      "What's brown and sticky? A stick.",
      "I made a pencil with two erasers. It was pointless."
    ];

    const btn = document.getElementById('jokeBtn');
    const box = document.getElementById('jokeBox');
    let last = -1;

    function randomFallback() {
      let i;
      do { i = Math.floor(Math.random() * FALLBACK_JOKES.length); }
      while (i === last && FALLBACK_JOKES.length > 1);
      last = i;
      return FALLBACK_JOKES[i];
    }

    function showJoke(text) {
      box.classList.remove('fade-in');
      // force reflow to restart animation
      void box.offsetWidth;
      box.textContent = text;
      box.classList.add('fade-in');
    }

    async function getJoke() {
      btn.disabled = true;
      try {
        const res = await fetch('https://icanhazdadjoke.com/', {
          headers: { 'Accept': 'application/json' }
        });
        if (!res.ok) throw new Error('bad response');
        const data = await res.json();
        showJoke(data.joke || randomFallback());
      } catch (e) {
        // Offline / opened as file:// — use the local stash of jokes.
        showJoke(randomFallback());
      } finally {
        btn.disabled = false;
      }
    }

    btn.addEventListener('click', getJoke);
  </script>
</body>
</html>
