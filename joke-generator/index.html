<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tell Me a Joke 😄</title>
  <style>
    :root {
      --bg1: #667eea;
      --bg2: #764ba2;
      --accent: #ffd93d;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 560px;
      text-align: center;
    }
    h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      margin: 0 0 6px;
    }
    .subtitle {
      margin: 0 0 28px;
      opacity: 0.85;
      font-size: 0.95rem;
    }
    button {
      background: var(--accent);
      color: #333;
      border: none;
      border-radius: 999px;
      padding: 16px 34px;
      font-size: 1.15rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 12px 26px rgba(0,0,0,0.28); }
    button:active { transform: translateY(1px) scale(0.98); }
    .joke-box {
      margin-top: 30px;
      width: 100%;
      min-height: 140px;
      border: none;
      border-radius: 16px;
      background: rgba(255,255,255,0.14);
      backdrop-filter: blur(4px);
      color: #fff;
      font-size: 1.2rem;
      line-height: 1.5;
      padding: 24px;
      resize: none;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* fade-in animation */
    .fade {
      animation: fadeIn 0.6s ease forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .count {
      margin-top: 16px;
      font-size: 0.85rem;
      opacity: 0.75;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Need a laugh? 😄</h1>
    <p class="subtitle">Hit the button. Keep hitting it. We dare you not to smile.</p>
    <button id="tellBtn">Tell me a joke</button>
    <div id="jokeBox" class="joke-box">Your joke will appear here…</div>
    <p id="count" class="count"></p>
  </main>

  <script>
    const jokes = [
      "Why don't skeletons fight each other? They don't have the guts.",
      "I'm reading a book about anti-gravity. It's impossible to put down.",
      "Why did the scarecrow win an award? He was outstanding in his field.",
      "I would tell you a chemistry joke, but I know I wouldn't get a reaction.",
      "Why don't scientists trust atoms? Because they make up everything.",
      "I told my wife she was drawing her eyebrows too high. She looked surprised.",
      "Why did the bicycle fall over? Because it was two-tired.",
      "What do you call fake spaghetti? An impasta.",
      "I used to play piano by ear, but now I use my hands.",
      "Why can't your nose be 12 inches long? Because then it would be a foot.",
      "I only know 25 letters of the alphabet. I don't know y.",
      "What do you call cheese that isn't yours? Nacho cheese.",
      "Why did the coffee file a police report? It got mugged.",
      "How do you organize a space party? You planet.",
      "I'm on a seafood diet. I see food and I eat it.",
      "Why did the math book look sad? It had too many problems.",
      "What do you call a fish wearing a bowtie? Sofishticated.",
      "Why don't eggs tell jokes? They'd crack each other up.",
      "I invented a new word: Plagiarism.",
      "Did you hear about the restaurant on the moon? Great food, no atmosphere."
    ];

    const btn = document.getElementById('tellBtn');
    const box = document.getElementById('jokeBox');
    const count = document.getElementById('count');
    let lastIndex = -1;
    let clicks = 0;

    function randomJoke() {
      let i;
      do {
        i = Math.floor(Math.random() * jokes.length);
      } while (i === lastIndex && jokes.length > 1);
      lastIndex = i;
      return jokes[i];
    }

    btn.addEventListener('click', () => {
      clicks++;
      box.textContent = randomJoke();
      // restart the fade animation
      box.classList.remove('fade');
      void box.offsetWidth; // force reflow
      box.classList.add('fade');
      count.textContent = clicks === 1 ? "1 joke so far — keep going!" : clicks + " jokes and counting! 😂";
    });
  </script>
</body>
</html>
