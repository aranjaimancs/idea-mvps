<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dad Joke Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fef9c3;
      font-family: 'Georgia', serif;
      padding: 2rem;
      color: #1c1917;
    }

    h1 {
      font-size: 2rem;
      color: #713f12;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    #joke-box {
      max-width: 640px;
      width: 100%;
      min-height: 8rem;
      background: #fff;
      border: 2px solid #d97706;
      border-radius: 14px;
      padding: 2rem;
      font-size: 1.5rem;
      line-height: 1.6;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #timer {
      margin-top: 1.5rem;
      font-size: 2.5rem;
      font-weight: bold;
      color: #92400e;
      font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
    }

    #timer-label {
      font-size: 0.85rem;
      color: #a16207;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 0.25rem;
    }

    #joke-btn {
      margin-top: 1.75rem;
      font-size: 1.25rem;
      font-weight: bold;
      padding: 0.85rem 2rem;
      border: 3px solid #92400e;
      border-radius: 12px;
      background: #f59e0b;
      color: #1c1917;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
      font-family: inherit;
    }

    #joke-btn:hover { background: #d97706; }
    #joke-btn:active { transform: scale(0.97); }
  </style>
</head>
<body>

  <h1>Dad Joke Generator</h1>

  <div id="joke-box" role="status" aria-live="polite">Loading a joke…</div>

  <div id="timer" aria-live="off">5:00</div>
  <div id="timer-label">until the next groaner</div>

  <button id="joke-btn">New Joke Now</button>

  <script src="script.js"></script>
</body>
</html>
